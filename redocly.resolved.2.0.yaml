openapi: 3.0.3
info:
  version: '2.0'
  title: Individuals Pensions Income (MTD)
  description: |
    The following endpoints are stateful in the Sandbox:
    * Retrieve Pensions Income
    * Create and Amend Pensions Income
    * Delete Pensions Income

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) 
    to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
paths:
  /individuals/pensions-income/{nino}/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve Pensions Income
      description: |
        This endpoint allows the developer to retrieve foreign pensions and overseas pension contributions. 
        A National Insurance number and tax year must be provided.

        ###  Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                      |
        | -------------------------------- | ----------------------------------------------------------------------------------------------------------------------------- |
        | N/A - DEFAULT                    | Simulates success response.                                                                                                   |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                                |
        | STATEFUL                         | Performs a stateful retrieve.                                                                                                 |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: &ref_4
            type: string
            example: 2021-22
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema:
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_6
            type: string
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Pensions Income Response
                description: Retrieve Pensions Income Response
                type: object
                properties:
                  submittedOn:
                    type: string
                    description: The date the pensions income was added. It must be provided in the format YYYY-MM-DDThh:mm:ssZ
                    example: '2021-04-06T09:37:17Z'
                  foreignPensions:
                    type: array
                    items: &ref_7
                      type: object
                      description: Financial details about foreign pensions income
                      properties:
                        countryCode:
                          type: string
                          description: A three-letter code that represents a country name. The value must in a ISO 3166-1 Alpha-3 format.
                          example: FRA
                        amountBeforeTax:
                          type: number
                          description: The total amount before any tax taken off pension. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                        taxTakenOff:
                          type: number
                          description: The amount of tax taken off pension. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                        specialWithholdingTax:
                          type: number
                          description: Special Withholding Tax (SWT) amount taken off this payment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                        foreignTaxCreditRelief:
                          type: boolean
                          description: A boolean indicating whether Foreign Tax Credit Relief (FTCR) has been claimed.
                          example: 'false'
                        taxableAmount:
                          type: number
                          description: This is the amount that will be liable to income tax and forms part of the total taxable income. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                      required:
                        - countryCode
                        - taxableAmount
                  overseasPensionContributions:
                    type: array
                    items: &ref_8
                      type: object
                      description: Financial details about overseas pension contributions income
                      properties:
                        customerReference:
                          type: string
                          description: A reference the user supplies to identify the record.
                          example: PENSIONINCOME245
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        exemptEmployersPensionContribs:
                          type: number
                          description: The amount the employer contributes to the overseas pension scheme. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                        migrantMemReliefQopsRefNo:
                          type: string
                          description: The qualifying overseas pension scheme reference number for migrant member relief.
                          example: QOPS000000
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        dblTaxationRelief:
                          type: number
                          description: The relief given as tax credit on the overseas earnings. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '1999.99'
                          multipleOf: 0.01
                          minimum: 0
                          'maximum:': 99999999999.99
                        dblTaxationCountryCode:
                          type: string
                          description: A three-letter code that represents the double taxation country name. The value must be ISO 3166-1 alpha-3
                          example: FRA
                        dblTaxationArticle:
                          type: string
                          description: The taxation article reference number.
                          example: AB3211-1
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        dblTaxationTreaty:
                          type: string
                          description: The name of the treaty that has the right to collect tax.
                          example: MUNICH
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        sf74reference:
                          type: string
                          description: The SF74 reference number for transitional corresponding relief claims.
                          example: SF74-123456
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                      required:
                        - exemptEmployersPensionContribs
                required:
                  - submittedOn
              examples:
                default:
                  description: Full Pensions Income
                  value:
                    $ref: ./examples/retrieve_response.json
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: &ref_9
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: &ref_10
                    code: FORMAT_TAX_YEAR
                    message: The provided tax year is invalid
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: &ref_11
                    code: RULE_TAX_YEAR_NOT_SUPPORTED
                    message: The tax year specified does not lie within the supported range
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: &ref_12
                    code: RULE_TAX_YEAR_RANGE_INVALID
                    message: Tax year range invalid. A tax year range of one year is required
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_13
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: &ref_14
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: The client and/or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: &ref_18
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: &ref_15
                    code: RULE_REQUEST_CANNOT_BE_FULFILLED
                    message: Custom (will vary in production depending on the actual error)
    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create and Amend Pensions Income
      description: |
        This endpoint enables you to create and amend foreign pensions and overseas pension contributions. 
        A National Insurance number and tax year must be provided.

        ###  Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                      |
        | -------------------------------- | ----------------------------------------------------------------------------------------------------------------------------- |
        | N/A - DEFAULT                    | Simulates success response.                                                                                                   |
        | STATEFUL                         | Performs a stateful create or update.                                                                                         |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                               |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema:
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_16
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Create And Amend Pensions Income Request
              description: Create And Amend Pensions Income Request
              type: object
              properties:
                foreignPensions:
                  type: array
                  items: *ref_7
                overseasPensionContributions:
                  type: array
                  items: *ref_8
            examples:
              full_amendment:
                description: Full Pensions Income Amendment
                value:
                  $ref: ./examples/amend_request.json
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: *ref_9
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: *ref_10
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: *ref_11
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: *ref_12
                FORMAT_COUNTRY_CODE:
                  description: The format of the supplied country code is not valid.
                  value:
                    code: FORMAT_COUNTRY_CODE
                    message: The format of the country code is invalid
                RULE_COUNTRY_CODE:
                  description: Not a valid ISO 3166-1 alpha-3 country code.
                  value:
                    code: RULE_COUNTRY_CODE
                    message: The country code is not a valid ISO 3166-1 alpha-3 country code
                RULE_OUTSIDE_AMENDMENT_WINDOW:
                  description: The request cannot be completed as you are outside the amendment window.
                  value: &ref_17
                    code: RULE_OUTSIDE_AMENDMENT_WINDOW
                    message: You are outside the amendment window
                FORMAT_VALUE:
                  description: One or more values have been added with the incorrect format.
                  value:
                    code: FORMAT_VALUE
                    message: The value must be between 0.00 and 99999999999.99
                FORMAT_CUSTOMER_REF:
                  description: The format of the supplied customer reference is not valid.
                  value:
                    code: FORMAT_CUSTOMER_REF
                    message: The provided customer reference is invalid
                FORMAT_QOPS_REF:
                  description: The format of QOPS reference number is not valid.
                  value:
                    code: FORMAT_QOPS_REF
                    message: The provided QOPS reference number is invalid
                FORMAT_DOUBLE_TAXATION_ARTICLE:
                  description: The format of double taxation article is not valid.
                  value:
                    code: FORMAT_DOUBLE_TAXATION_ARTICLE
                    message: The provided double taxation article is invalid
                FORMAT_DOUBLE_TAXATION_TREATY:
                  description: The format of double taxation treaty is not valid.
                  value:
                    code: FORMAT_DOUBLE_TAXATION_TREATY
                    message: The provided double taxation treaty is invalid
                FORMAT_SF74_REF:
                  description: The format of SF74 reference is not valid.
                  value:
                    code: FORMAT_SF74_REF
                    message: The provided SF74 reference is invalid
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: An empty or non-matching body was submitted.
                  value:
                    code: RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED
                    message: An empty or non-matching body was submitted
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_13
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_14
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: *ref_15
    delete:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Delete Pensions Income
      description: |
        This endpoint allows the developer to delete foreign pensions and overseas pension contributions. 
        A National Insurance number and tax year must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                      |
        | -------------------------------- | ----------------------------------------------------------------------------------------------------------------------------- |
        | N/A - DEFAULT                    | Simulates success response.                                                                                                   |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                                |
        | STATEFUL                         | Performs a stateful delete.                                                                                                   |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                               |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_16
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      responses:
        '204':
          description: No Content
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
